<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Car Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav */
        nav {
            background: #1a1b23;
            border-bottom: 1px solid #2a2b35;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        nav .subtitle {
            font-size: 12px;
            color: #71717a;
            margin-top: 2px;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
        }
        .nav-links a {
            color: #a1a1aa;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            background: #27272a;
            border-radius: 8px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #3f3f46;
            color: #fff;
        }

        /* Main */
        main {
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: #1a1b23;
            border: 1px solid #2a2b35;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            transition: border-color 0.15s;
        }
        .card:active { border-color: #4f46e5; }
        .card a { color: inherit; text-decoration: none; display: block; }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: #22c55e;
        }
        .card-price.drop { color: #ef4444; }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 12px;
            color: #a1a1aa;
        }
        .card-meta span {
            background: #27272a;
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-source { background: #1e3a5f; color: #60a5fa; }
        .badge-drop { background: #3b1219; color: #f87171; }
        .badge-new { background: #14332a; color: #4ade80; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: #fff;
        }
        .btn-primary { background: #4f46e5; }
        .btn-primary:hover { background: #4338ca; }
        .btn-primary:disabled { background: #27272a; color: #71717a; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3f3f46;
            color: #a1a1aa;
        }
        .btn-outline.active, .btn-outline:hover {
            background: #3f3f46;
            color: #fff;
        }

        /* Filter bar */
        .filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #1a1b23;
            border: 1px solid #2a2b35;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }
        .stat-card .label {
            font-size: 11px;
            color: #71717a;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status banner */
        .status-banner {
            background: #1e3a5f;
            color: #60a5fa;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-banner.error { background: #3b1219; color: #f87171; }

        /* Forms */
        input, select {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #e4e4e7;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 15px;
            width: 100%;
            outline: none;
        }
        input:focus, select:focus { border-color: #4f46e5; }
        label {
            display: block;
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group { margin-bottom: 12px; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        /* Section headers */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }

        /* Info display */
        .info-section {
            background: #1a1b23;
            border: 1px solid #2a2b35;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .info-section h3 {
            font-size: 13px;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px solid #27272a;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #a1a1aa; }
        .info-value { color: #fff; font-weight: 500; }

        /* Stars */
        .stars { color: #eab308; font-size: 16px; letter-spacing: 1px; }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #71717a;
        }
        .empty h3 { color: #a1a1aa; margin-bottom: 8px; }

        /* History table */
        .history-list { list-style: none; }
        .history-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #27272a;
            font-size: 14px;
        }
        .price-up { color: #ef4444; }
        .price-down { color: #22c55e; }

        /* Scrape actions */
        .scrape-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="title">Car Tracker</div>
        <div class="subtitle">{% block subtitle %}Track used cars under $20k{% endblock %}</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Search</a>
            <a href="/drops" class="{% if request.path == '/drops' %}active{% endif %}">Price Drops</a>
            <a href="/info" class="{% if request.path == '/info' %}active{% endif %}">Car Info</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
